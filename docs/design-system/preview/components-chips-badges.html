<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="row" style="gap:8px">
    <span class="chip chip--3E">3E</span>
    <span class="chip chip--4U">4U</span>
    <span class="chip chip--2C">2C</span>
    <span class="chip chip--2N">2N</span>
    <span class="chip chip--2Q">2Q</span>
  </div>
  <div class="row" style="gap:8px;border-top:1px solid var(--border-subtle);padding-top:10px">
    <span class="badge badge--assigned">✓ Auto-asignado</span>
    <span class="badge badge--unassigned">○ Sin asignar</span>
    <span class="badge badge--conflict">! Conflicto</span>
    <span class="badge badge--confirmed">✓✓ Confirmado</span>
  </div>
  <div class="mono" style="border-top:1px solid var(--border-subtle);padding-top:8px">Chips: facetas NBR 15965 — Badges: estados de mapeo IFC</div>
</div></body></html>
