<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .stage {
    background:#1E1E1E; padding:24px;
    display:flex; gap:24px; flex-wrap:wrap;
  }
  .v3d {
    width:260px; height:170px;
    background:linear-gradient(135deg,#1A1A1A 0%,#252526 100%);
    border:1px solid #3E3E42;
    position:relative;
    display:flex; align-items:center; justify-content:center;
  }
  .v3d::before {
    content:""; position:absolute; inset:0;
    background-image:linear-gradient(rgba(255,255,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.03) 1px,transparent 1px);
    background-size:20px 20px;
  }
  .cube {
    width:80px; height:80px;
    transform:rotateX(20deg) rotateY(35deg);
    transform-style:preserve-3d;
    position:relative;
  }
  .face { position:absolute; inset:0; border:1px solid #5BA0E8; background:rgba(91,160,232,0.08); }
  .f1 { transform:translateZ(40px); }
  .f2 { transform:rotateY(90deg) translateZ(40px); }
  .f3 { transform:rotateX(90deg) translateZ(40px); }
  .toolbar {
    position:absolute; bottom:8px; right:8px;
    display:flex; gap:2px;
    background:rgba(37,37,38,0.9);
    border:1px solid #3E3E42; border-radius:4px;
    padding:2px;
    backdrop-filter:blur(6px);
  }
  .toolbar button {
    width:24px; height:24px; border:0; background:transparent; color:#9D9D9D;
    display:flex; align-items:center; justify-content:center; cursor:pointer;
    border-radius:3px;
  }
  .toolbar button:hover { color:#CCCCCC; background:#3E3E42; }
  .toolbar button.active { color:#0078D4; }
  .col { display:flex; flex-direction:column; gap:6px; }
</style>
</head>
<body>
<div class="stage">
  <div class="col">
    <div class="v3d">
      <div class="cube"><div class="face f1"></div><div class="face f2"></div><div class="face f3"></div></div>
      <div class="toolbar">
        <button class="active" title="Orbitar"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="12" rx="8.5" ry="3.5"/><ellipse cx="12" cy="12" rx="3.5" ry="8.5"/><circle cx="12" cy="12" r="1.6" fill="currentColor" stroke="none"/></svg></button>
        <button title="Zoom extents"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9,4 4,4 4,9"/><polyline points="15,4 20,4 20,9"/><polyline points="20,15 20,20 15,20"/><polyline points="9,20 4,20 4,15"/></svg></button>
        <button title="Reset"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12 a8 8 0 0 1 13.5 -5.5"/><polyline points="14,3 17.5,6.5 14,10"/></svg></button>
        <button title="Wireframe"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3.5 L20.5 7.5 L20.5 16.5 L12 20.5 L3.5 16.5 L3.5 7.5 Z" stroke-dasharray="2 2"/></svg></button>
      </div>
    </div>
    <div class="mono" style="margin-top:6px">Visor 3D · toolbar flotante esquina inferior derecha · 4 controles 24×24px</div>
  </div>
  <div style="flex:1;color:#9D9D9D;font-size:12px;line-height:1.55">
    <div style="color:#CCCCCC;font-size:13px;font-weight:500;margin-bottom:6px">Controles del Visor</div>
    Orbitar (activo por defecto) · Zoom a extents · Reset vista · Toggle wireframe.<br><br>
    Fondo semitransparente <span style="font-family:'JetBrains Mono',monospace">rgba(37,37,38,0.9)</span> sobre el canvas, con backdrop-blur para legibilidad.
  </div>
</div>
</body></html>
