<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="row row--even">
    <div class="swatch"><div class="swatch__color" style="background:#CCCCCC"></div><div class="swatch__name">text-primary</div><div class="swatch__hex">#CCCCCC</div></div>
    <div class="swatch"><div class="swatch__color" style="background:#9D9D9D"></div><div class="swatch__name">text-secondary</div><div class="swatch__hex">#9D9D9D</div></div>
    <div class="swatch"><div class="swatch__color" style="background:#6B6B6B"></div><div class="swatch__name">text-disabled</div><div class="swatch__hex">#6B6B6B</div></div>
    <div class="swatch"><div class="swatch__color" style="background:#FFFFFF"></div><div class="swatch__name">text-on-accent</div><div class="swatch__hex">#FFFFFF</div></div>
  </div>
  <div style="display:flex;flex-direction:column;gap:2px;padding-top:6px;border-top:1px solid var(--border-subtle)">
    <span style="color:#CCCCCC;font-size:13px">Muro de mampostería 15cm — ladrillo cerámico hueco</span>
    <span style="color:#9D9D9D;font-size:12px">Cantidad calculada del modelo IFC · Nivel 2 · Eje B-C</span>
    <span style="color:#6B6B6B;font-size:12px">Sin precio asignado</span>
  </div>
</div></body></html>
