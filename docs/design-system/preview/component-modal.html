<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .scrim { background:rgba(0,0,0,0.55); padding:24px; display:flex; justify-content:center; }
  .modal {
    width:480px; background:#252526; border:1px solid #3E3E42; border-radius:6px;
    box-shadow:0 8px 32px rgba(0,0,0,0.6);
    overflow:hidden;
  }
  .modal__hdr { padding:14px 20px 6px; }
  .modal__title { font-size:15px; font-weight:600; color:#CCCCCC; display:flex; gap:8px; align-items:center; }
  .modal__title svg { color:#FF9800; }
  .modal__body { padding:6px 20px 16px; font-size:13px; color:#9D9D9D; line-height:1.55; }
  .modal__body strong { color:#CCCCCC; }
  .modal__footer { display:flex; justify-content:flex-end; gap:8px; padding:12px 16px; border-top:1px solid #3E3E42; background:#2D2D30; }
</style>
</head>
<body>
<div class="scrim">
  <div class="modal">
    <div class="modal__hdr">
      <div class="modal__title">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3.5 L21 19.5 L3 19.5 Z"/><line x1="12" y1="10" x2="12" y2="14"/><circle cx="12" cy="17" r="0.4" fill="currentColor" stroke="none"/></svg>
        Modificación global de precio
      </div>
    </div>
    <div class="modal__body">
      Estás modificando el precio de <strong>Albañil oficial (2N.01.02.005)</strong>. Este cambio se aplicará a <strong>todos los ítems</strong> que usen este insumo, alterando múltiples APUs del proyecto.
    </div>
    <div class="modal__footer">
      <button class="btn btn--ghost">Cancelar</button>
      <button class="btn btn--primary">Confirmar modificación</button>
    </div>
  </div>
</div>
<div class="card" style="padding:14px 24px"><div class="mono">Modal · radius 6 · scrim rgba(0,0,0,0.55) · sombra fuerte · CTA primario para acción global crítica</div></div>
</body></html>
