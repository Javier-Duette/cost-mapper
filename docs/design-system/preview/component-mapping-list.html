<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../theme.css"></head>
<body style="background:var(--bg-base);color:var(--text-primary);font-family:var(--font-sans);font-size:12px;margin:0;padding:14px;">
<div style="border:1px solid var(--border-default);border-radius:4px;overflow:hidden;background:var(--bg-surface);">
  <div style="padding:8px 14px;border-bottom:1px solid var(--border-default);font-size:10px;color:var(--text-secondary);letter-spacing:.06em;text-transform:uppercase;display:flex;justify-content:space-between;">
    <span>Elementos del modelo IFC</span><span style="font-family:var(--font-mono);">7 de 247</span>
  </div>

  <div style="display:flex;gap:10px;align-items:center;padding:8px 14px;border-bottom:1px solid var(--border-subtle);background:var(--accent-subtle);border-left:2px solid var(--accent);padding-left:12px;">
    <span style="width:16px;height:16px;border-radius:50%;background:rgba(76,175,80,.18);color:var(--success);font-size:10px;display:flex;align-items:center;justify-content:center;">✓</span>
    <div style="flex:1;">
      <div style="font-size:12px;"><span style="font-family:var(--font-mono);font-size:10px;color:var(--text-secondary);margin-right:8px;">IfcWall:142</span>Muro EXT — Eje A 1-4</div>
      <div style="font-size:10px;color:var(--text-secondary);margin-top:1px;">Ladrillo cerámico 15cm</div>
    </div>
    <span style="font-family:var(--font-mono);font-size:11px;color:var(--accent);">3E.04.07.001</span>
  </div>

  <div style="display:flex;gap:10px;align-items:center;padding:8px 14px;border-bottom:1px solid var(--border-subtle);">
    <span style="width:16px;height:16px;border-radius:50%;background:var(--bg-surface-raised);color:var(--text-secondary);font-size:10px;display:flex;align-items:center;justify-content:center;">+</span>
    <div style="flex:1;">
      <div style="font-size:12px;"><span style="font-family:var(--font-mono);font-size:10px;color:var(--text-secondary);margin-right:8px;">IfcWall:158</span>Muro INT — Baño 01</div>
      <div style="font-size:10px;color:var(--text-secondary);margin-top:1px;">Ladrillo cerámico 11cm</div>
    </div>
    <span style="font-family:var(--font-mono);font-size:11px;color:var(--warning);">Asignar →</span>
  </div>

  <div style="display:flex;gap:10px;align-items:center;padding:8px 14px;">
    <span style="width:16px;height:16px;border-radius:50%;background:rgba(255,152,0,.18);color:var(--warning);font-size:10px;display:flex;align-items:center;justify-content:center;">!</span>
    <div style="flex:1;">
      <div style="font-size:12px;"><span style="font-family:var(--font-mono);font-size:10px;color:var(--text-secondary);margin-right:8px;">IfcWindow:21</span>V01 — 1.20×1.40</div>
      <div style="font-size:10px;color:var(--text-secondary);margin-top:1px;">Aluminio + DVH · Conflicto detectado</div>
    </div>
    <span style="font-family:var(--font-mono);font-size:11px;color:var(--warning);">Asignar →</span>
  </div>
</div>
</body></html>
