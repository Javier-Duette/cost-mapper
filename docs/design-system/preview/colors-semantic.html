<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">

    <div class="swatch"><div class="swatch__color" style="background:#3D2B00"></div><div class="swatch__name">warning-subtle</div><div class="swatch__hex">#3D2B00</div></div>
    <div class="swatch"><div class="swatch__color" style="background:#3D0000"></div><div class="swatch__name">error-subtle</div><div class="swatch__hex">#3D0000</div></div>
  </div>
