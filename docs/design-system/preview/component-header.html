<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .header {
    height: 48px;
    background: #252526;
    border-bottom: 1px solid #3E3E42;
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 16px;
  }
  .header__brand { display: flex; align-items: center; gap: 8px; min-width: 180px; }
  .header__brand .name { font-size: 14px; font-weight: 600; color: #CCCCCC; }
  .header__center { flex: 1; display: flex; justify-content: center; }
  .header__project {
    display: flex; align-items: center; gap: 10px;
    height: 32px; padding: 0 12px;
    background: #2D2D30; border: 1px solid #3E3E42; border-radius: 4px;
    cursor: pointer; min-width: 280px;
  }
  .header__project:hover { background: #3E3E42; }
  .header__project .pname { color: #CCCCCC; font-size: 14px; font-weight: 500; line-height: 1; }
  .header__project .ploc  { color: #9D9D9D; font-size: 11px; line-height: 1; margin-top:3px; }
  .header__right { display: flex; align-items: center; gap: 12px; }
  .avatar { width:28px; height:28px; border-radius:50%; background:#0078D4; color:#fff; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:600; }
  .ico { color:#9D9D9D; }
  .ico:hover { color:#CCCCCC; }
</style>
</head>
<body>
<div class="header">
  <div class="header__brand">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#0078D4" stroke-width="1.5" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M8 13 L11 16 L16 8" stroke-width="2"/><circle cx="17.5" cy="6.5" r="1.4" fill="#0078D4" stroke="none"/></svg>
    <span class="name">Cost-Mapper</span>
  </div>
  <div class="header__center">
    <div class="header__project">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#9D9D9D" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3.5 7 a1 1 0 0 1 1 -1 H9.5 L11.5 8 H19.5 a1 1 0 0 1 1 1 V18 a1 1 0 0 1 -1 1 H4.5 a1 1 0 0 1 -1 -1 Z"/></svg>
      <div style="display:flex;flex-direction:column;flex:1">
        <div class="pname">Vivienda unifamiliar — Lambaré</div>
        <div class="ploc">/proyectos/2026/lambare-pillares</div>
      </div>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#9D9D9D" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6,9.5 12,15.5 18,9.5"/></svg>
    </div>
  </div>
  <div class="header__right">
    <span style="color:#9D9D9D;font-size:12px">F. Benítez</span>
    <div class="avatar">FB</div>
    <svg class="ico" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="2.5"/><path d="M12 3.5 L13.2 5.7 L15.6 5 L16.4 7.4 L18.8 7.8 L18.4 10.4 L20.5 12 L18.4 13.6 L18.8 16.2 L16.4 16.6 L15.6 19 L13.2 18.3 L12 20.5 L10.8 18.3 L8.4 19 L7.6 16.6 L5.2 16.2 L5.6 13.6 L3.5 12 L5.6 10.4 L5.2 7.8 L7.6 7.4 L8.4 5 L10.8 5.7 Z"/></svg>
  </div>
</div>
<div class="card" style="padding:14px 24px">
  <div class="mono">Header — 48px · brand izquierda · selector de proyecto centrado · usuario + ajustes derecha</div>
</div>
</body></html>
