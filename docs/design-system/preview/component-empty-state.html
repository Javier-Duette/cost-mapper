<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .empty {
    background:#1E1E1E; border:1px dashed #3E3E42; border-radius:0;
    padding:48px 24px; text-align:center;
    display:flex; flex-direction:column; align-items:center; gap:14px;
    color:#9D9D9D;
  }
  .empty svg { color:#6B6B6B; }
  .empty__title { color:#CCCCCC; font-size:14px; font-weight:500; }
  .empty__sub { font-size:12px; max-width:340px; line-height:1.5; }
</style>
</head>
<body>
<div style="padding:14px 16px;background:#1E1E1E">
<div class="empty">
  <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3.5 L20.5 7.5 L20.5 16.5 L12 20.5 L3.5 16.5 L3.5 7.5 Z" stroke-dasharray="2 2"/><path d="M3.5 7.5 L12 11.5 L20.5 7.5" stroke-dasharray="2 2"/><path d="M12 11.5 L12 20.5" stroke-dasharray="2 2"/></svg>
  <div class="empty__title">No hay modelo IFC cargado</div>
  <div class="empty__sub">Importá un archivo .ifc desde la sección <span style="color:#0078D4">Mapeo IFC</span> para vincular geometría con costos del catálogo.</div>
  <button class="btn btn--primary"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 14.5 V18 a1 1 0 0 0 1 1 H18 a1 1 0 0 0 1 -1 V14.5"/><line x1="12" y1="4" x2="12" y2="14.5"/><polyline points="8,11 12,14.5 16,11"/></svg> Subir modelo IFC</button>
</div>
</div>
<div class="card" style="padding:14px 24px"><div class="mono">Empty state · ilustración con líneas dashed · CTA primario · texto descriptivo, no enérgico</div></div>
</body></html>
