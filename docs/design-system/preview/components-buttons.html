<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="row" style="gap:8px">
    <button class="btn btn--primary">Subir modelo IFC</button>
    <button class="btn btn--primary" disabled style="opacity:0.5">Cargando…</button>
    <button class="btn">Cancelar</button>
    <button class="btn btn--ghost">Limpiar filtros</button>
    <button class="btn btn--danger">Eliminar</button>
  </div>
  <div class="row" style="gap:8px">
    <button class="btn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Añadir ítem</button>
    <button class="btn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 14.5 V18 a1 1 0 0 0 1 1 H18 a1 1 0 0 0 1 -1 V14.5"/><line x1="12" y1="14.5" x2="12" y2="4"/><polyline points="8,7.5 12,4 16,7.5"/></svg> Exportar</button>
    <button class="btn btn--ghost"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20 L8 19 L19 8 L16 5 L5 16 Z"/></svg> Editar</button>
  </div>
  <div class="mono" style="border-top:1px solid var(--border-subtle);padding-top:8px">Altura 28px · radius 4px · transición 100ms</div>
</div></body></html>
